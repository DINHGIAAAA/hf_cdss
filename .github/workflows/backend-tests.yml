name: Backend tests

on:
  push:
    paths:
      - "backend/**"
      - "scraper/**"
      - "training/**"
      - "data/heart_failure/config/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - "scraper/**"
      - "training/**"
      - "data/heart_failure/config/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          HF_CDSS_ENVIRONMENT: test
          HF_CDSS_API_KEYS: test-api-key
          HF_CDSS_LLM_BASE_URL: http://127.0.0.1:9/v1
          HF_CDSS_LLM_TIMEOUT_SECONDS: "1"
          HF_CDSS_CLINICAL_INTAKE_LLM_TIMEOUT_SECONDS: "1"
          HF_CDSS_HYDE_RETRIEVAL_ENABLED: "false"
        run: pytest app/tests -q --durations=10

  scraper-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper semantic tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          HF_CDSS_ENVIRONMENT: test
        run: >
          pytest app/tests/test_semantic_ingestion.py
          app/tests/test_semantic_retrieval.py
          app/tests/test_text_normalization.py
          app/tests/test_opendataloader_extract.py
          -q

  training-convert-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install "pytest>=8.2.0"

      - name: Run intake fine-tune converter tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest training/tests -q
