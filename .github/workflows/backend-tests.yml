name: Backend tests

on:
  push:
    paths:
      - "backend/**"
      - "scraper/**"
      - "data/heart_failure/config/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - "scraper/**"
      - "data/heart_failure/config/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest app/tests -q

      - name: Run semantic ingestion tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest app/tests/test_semantic_ingestion.py app/tests/test_semantic_retrieval.py -q
