services:
  backend:
    build:
      context: ../backend
    ports:
      - "8000:8000"
    environment:
      HF_CDSS_ENVIRONMENT: docker

  frontend:
    build:
      context: ../frontend/doctor-dashboard
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hf_cdss
      POSTGRES_PASSWORD: hf_cdss
      POSTGRES_DB: hf_cdss
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  neo4j_data:
  chroma_data:

