services:
  ollama:
    image: ollama/ollama:latest
    container_name: hf_cdss_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    container_name: hf_cdss_ollama_pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c"]
    command: ["ollama pull ${OLLAMA_MODEL:-qwen2.5:7b} && ollama pull ${OLLAMA_AGENT_MODEL:-qwen2.5:1.5b} && ollama pull ${OLLAMA_EMBEDDING_MODEL:-bge-m3}"]
    restart: "no"

  backend:
    build:
      context: ../backend
    container_name: hf_cdss_backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    # Ghi đè lệnh khởi động để thêm --reload giúp tự động cập nhật code
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      HF_CDSS_ENVIRONMENT: ${HF_CDSS_ENVIRONMENT:-docker}
      HF_CDSS_CORS_ORIGINS: ${HF_CDSS_CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173"]}
      HF_CDSS_API_KEYS: ${HF_CDSS_API_KEYS:-change-me}
      HF_CDSS_API_KEY_HEADER: ${HF_CDSS_API_KEY_HEADER:-x-api-key}
      HF_CDSS_MAX_REQUEST_BODY_BYTES: ${HF_CDSS_MAX_REQUEST_BODY_BYTES:-1000000}
      HF_CDSS_OPENAI_API_KEY: ${HF_CDSS_OPENAI_API_KEY:-${OPENAI_API_KEY:-}}
      HF_CDSS_LLM_BASE_URL: ${HF_CDSS_LLM_BASE_URL:-http://ollama:11434/v1}
      HF_CDSS_LLM_MODEL: ${HF_CDSS_LLM_MODEL:-${OLLAMA_MODEL:-qwen2.5:7b}}
      HF_CDSS_LLM_API_TYPE: ${HF_CDSS_LLM_API_TYPE:-chat_completions}
      HF_CDSS_LLM_TIMEOUT_SECONDS: ${HF_CDSS_LLM_TIMEOUT_SECONDS:-90}
      HF_CDSS_LLM_CACHE_ENABLED: ${HF_CDSS_LLM_CACHE_ENABLED:-true}
      HF_CDSS_LLM_CACHE_TTL_SECONDS: ${HF_CDSS_LLM_CACHE_TTL_SECONDS:-600}
      HF_CDSS_LLM_CACHE_MAX_ENTRIES: ${HF_CDSS_LLM_CACHE_MAX_ENTRIES:-128}
      HF_CDSS_CLINICAL_INTAKE_LLM_ENABLED: ${HF_CDSS_CLINICAL_INTAKE_LLM_ENABLED:-true}
      HF_CDSS_CLINICAL_INTAKE_LLM_TIMEOUT_SECONDS: ${HF_CDSS_CLINICAL_INTAKE_LLM_TIMEOUT_SECONDS:-20}
      HF_CDSS_CLINICAL_INTAKE_LLM_MAX_TOKENS: ${HF_CDSS_CLINICAL_INTAKE_LLM_MAX_TOKENS:-700}
      HF_CDSS_POSTGRES_DSN: ${HF_CDSS_POSTGRES_DSN:-postgresql://hf_cdss:hf_cdss@postgres:5432/hf_cdss}
      HF_CDSS_NEO4J_URI: ${HF_CDSS_NEO4J_URI:-bolt://neo4j:7687}
      HF_CDSS_NEO4J_USER: ${HF_CDSS_NEO4J_USER:-neo4j}
      HF_CDSS_NEO4J_PASSWORD: ${HF_CDSS_NEO4J_PASSWORD:-password}
      HF_CDSS_CHROMA_HOST: ${HF_CDSS_CHROMA_HOST:-chromadb}
      HF_CDSS_CHROMA_PORT: ${HF_CDSS_CHROMA_PORT:-8000}
      HF_CDSS_CHROMA_COLLECTION: ${HF_CDSS_CHROMA_COLLECTION:-heart_failure_evidence}
      HF_CDSS_EMBEDDING_PROVIDER: ${HF_CDSS_EMBEDDING_PROVIDER:-ollama}
      HF_CDSS_EMBEDDING_MODEL: ${HF_CDSS_EMBEDDING_MODEL:-${OLLAMA_EMBEDDING_MODEL:-bge-m3}}
      HF_CDSS_EMBEDDING_BASE_URL: ${HF_CDSS_EMBEDDING_BASE_URL:-http://ollama:11434}
      HF_CDSS_EMBEDDING_DIMENSIONS: ${HF_CDSS_EMBEDDING_DIMENSIONS:-1024}
      HF_CDSS_EMBEDDING_BATCH_SIZE: ${HF_CDSS_EMBEDDING_BATCH_SIZE:-16}
      HF_CDSS_SEMANTIC_RERANK_CANDIDATES: ${HF_CDSS_SEMANTIC_RERANK_CANDIDATES:-24}
      HF_CDSS_SEMANTIC_RERANK_WEIGHT: ${HF_CDSS_SEMANTIC_RERANK_WEIGHT:-0.75}
      HF_CDSS_RETRIEVAL_BACKEND: ${HF_CDSS_RETRIEVAL_BACKEND:-hybrid}
      HF_CDSS_POSTGRES_AUDIT_ENABLED: ${HF_CDSS_POSTGRES_AUDIT_ENABLED:-true}
      HF_CDSS_AUDIT_SCHEMA_VERSION: ${HF_CDSS_AUDIT_SCHEMA_VERSION:-2026-06-12}
      HF_CDSS_RATE_LIMIT_REQUESTS: ${HF_CDSS_RATE_LIMIT_REQUESTS:-60}
      HF_CDSS_RATE_LIMIT_WINDOW_SECONDS: ${HF_CDSS_RATE_LIMIT_WINDOW_SECONDS:-60}
      HF_CDSS_POSTGRES_POOL_MIN_SIZE: ${HF_CDSS_POSTGRES_POOL_MIN_SIZE:-1}
      HF_CDSS_POSTGRES_POOL_MAX_SIZE: ${HF_CDSS_POSTGRES_POOL_MAX_SIZE:-5}
      HF_CDSS_VERIFICATION_AGENT_MODE: ${HF_CDSS_VERIFICATION_AGENT_MODE:-hybrid}
      HF_CDSS_VERIFICATION_AGENT_MODEL: ${HF_CDSS_VERIFICATION_AGENT_MODEL:-${OLLAMA_AGENT_MODEL:-qwen2.5:1.5b}}
      HF_CDSS_VERIFICATION_AGENT_MAX_ITERATIONS: ${HF_CDSS_VERIFICATION_AGENT_MAX_ITERATIONS:-1}
      HF_CDSS_VERIFICATION_AGENT_MAX_TOKENS: ${HF_CDSS_VERIFICATION_AGENT_MAX_TOKENS:-140}
      HF_CDSS_VERIFICATION_AGENT_TIMEOUT_SECONDS: ${HF_CDSS_VERIFICATION_AGENT_TIMEOUT_SECONDS:-180}
      HF_CDSS_VERIFICATION_AGENT_WORKERS: ${HF_CDSS_VERIFICATION_AGENT_WORKERS:-2}
      HF_CDSS_VERIFICATION_AGENT_LLM_AGENTS: ${HF_CDSS_VERIFICATION_AGENT_LLM_AGENTS:-evidence_agent,guideline_alignment_agent}
      HF_CDSS_VERIFICATION_AGENT_TOOL_MODE: ${HF_CDSS_VERIFICATION_AGENT_TOOL_MODE:-direct}
      HF_CDSS_VERIFICATION_RETRIEVAL_TOP_K: ${HF_CDSS_VERIFICATION_RETRIEVAL_TOP_K:-3}
      HF_CDSS_VERIFICATION_CACHE_ENABLED: ${HF_CDSS_VERIFICATION_CACHE_ENABLED:-true}
      HF_CDSS_VERIFICATION_CACHE_TTL_SECONDS: ${HF_CDSS_VERIFICATION_CACHE_TTL_SECONDS:-300}
      HF_CDSS_VERIFICATION_CACHE_MAX_ENTRIES: ${HF_CDSS_VERIFICATION_CACHE_MAX_ENTRIES:-128}
      HF_CDSS_ARTIFACT_CACHE_ROOT: ${HF_CDSS_ARTIFACT_CACHE_ROOT:-/tmp/hf_cdss/heart_failure}
      HF_CDSS_S3_ENDPOINT_URL: ${HF_CDSS_S3_ENDPOINT_URL:-http://localstack:4566}
      HF_CDSS_RAW_BUCKET: ${HF_CDSS_RAW_BUCKET:-hf-cdss-raw}
      HF_CDSS_PROCESSED_BUCKET: ${HF_CDSS_PROCESSED_BUCKET:-hf-cdss-processed}
      HF_CDSS_S3_PREFIX: ${HF_CDSS_S3_PREFIX:-heart_failure}
      HF_CDSS_AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      HF_CDSS_AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      HF_CDSS_AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      HF_CDSS_REDIS_URL: ${HF_CDSS_REDIS_URL:-redis://redis:6379/0}
      HF_CDSS_JWT_SECRET_KEY: ${HF_CDSS_JWT_SECRET_KEY:-hf-cdss-dev-jwt-secret-change-me}
      HF_CDSS_JWT_ALGORITHM: ${HF_CDSS_JWT_ALGORITHM:-HS256}
      HF_CDSS_JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${HF_CDSS_JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      HF_CDSS_AUTH_LOGIN_ENABLED: ${HF_CDSS_AUTH_LOGIN_ENABLED:-${HF_CDSS_AUTH_DEV_LOGIN_ENABLED:-true}}
      HF_CDSS_AUTH_SEED_USERS_JSON: ${HF_CDSS_AUTH_SEED_USERS_JSON:-${HF_CDSS_AUTH_DEV_USERS_JSON:-}}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 180s
    restart: unless-stopped

  airflow:
    build:
      context: ./airflow
    container_name: hf_cdss_airflow
    profiles: ["airflow"]
    command: ["airflow", "standalone"]
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__PARALLELISM: "8"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-hf_cdss}:${POSTGRES_PASSWORD:-hf_cdss}@postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE: "10"
      AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW: "20"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_PRE_PING: "true"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-hf_cdss_airflow_dev_secret}
      HF_CDSS_PROJECT_ROOT: /opt/airflow/project
      HF_CDSS_POSTGRES_DSN: ${HF_CDSS_POSTGRES_DSN:-postgresql://hf_cdss:hf_cdss@postgres:5432/hf_cdss}
      HF_CDSS_NEO4J_URI: ${HF_CDSS_NEO4J_URI:-bolt://neo4j:7687}
      HF_CDSS_NEO4J_USER: ${HF_CDSS_NEO4J_USER:-neo4j}
      HF_CDSS_NEO4J_PASSWORD: ${HF_CDSS_NEO4J_PASSWORD:-password}
      HF_CDSS_CHROMA_HOST: ${HF_CDSS_CHROMA_HOST:-chromadb}
      HF_CDSS_CHROMA_PORT: ${HF_CDSS_CHROMA_PORT:-8000}
      HF_CDSS_CHROMA_COLLECTION: ${HF_CDSS_CHROMA_COLLECTION:-heart_failure_evidence}
      HF_CDSS_EMBEDDING_PROVIDER: ${HF_CDSS_EMBEDDING_PROVIDER:-ollama}
      HF_CDSS_EMBEDDING_MODEL: ${HF_CDSS_EMBEDDING_MODEL:-${OLLAMA_EMBEDDING_MODEL:-bge-m3}}
      HF_CDSS_EMBEDDING_BASE_URL: ${HF_CDSS_EMBEDDING_BASE_URL:-http://ollama:11434}
      HF_CDSS_EMBEDDING_DIMENSIONS: ${HF_CDSS_EMBEDDING_DIMENSIONS:-1024}
      HF_CDSS_EMBEDDING_BATCH_SIZE: ${HF_CDSS_EMBEDDING_BATCH_SIZE:-16}
      HF_CDSS_SEMANTIC_RERANK_CANDIDATES: ${HF_CDSS_SEMANTIC_RERANK_CANDIDATES:-24}
      HF_CDSS_SEMANTIC_RERANK_WEIGHT: ${HF_CDSS_SEMANTIC_RERANK_WEIGHT:-0.75}
      HF_CDSS_DATA_STORAGE: ${HF_CDSS_DATA_STORAGE:-s3}
      HF_CDSS_S3_ENDPOINT_URL: ${HF_CDSS_S3_ENDPOINT_URL:-http://localstack:4566}
      HF_CDSS_RAW_BUCKET: ${HF_CDSS_RAW_BUCKET:-hf-cdss-raw}
      HF_CDSS_PROCESSED_BUCKET: ${HF_CDSS_PROCESSED_BUCKET:-hf-cdss-processed}
      HF_CDSS_S3_PREFIX: ${HF_CDSS_S3_PREFIX:-heart_failure}
      HF_CDSS_AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      HF_CDSS_AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      HF_CDSS_AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      HF_CDSS_POSTGRES_POOL_MIN_SIZE: ${HF_CDSS_POSTGRES_POOL_MIN_SIZE:-1}
      HF_CDSS_POSTGRES_POOL_MAX_SIZE: ${HF_CDSS_POSTGRES_POOL_MAX_SIZE:-5}
      HF_CDSS_KAFKA_BOOTSTRAP_SERVERS: ${HF_CDSS_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      HF_CDSS_KAFKA_IMPORTANT_SECTIONS_TOPIC: ${HF_CDSS_KAFKA_IMPORTANT_SECTIONS_TOPIC:-important_sections}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      # Mount code vào để các lệnh `python -m scraper...` có thể chạy
      - ../backend:/opt/airflow/project/backend
      - ../scraper:/opt/airflow/project/scraper
      - ../data/heart_failure/sources:/opt/airflow/project/data/heart_failure/sources:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: doctor-dashboard/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_API_KEY: ${VITE_API_KEY:-${HF_CDSS_API_KEYS:-change-me}}
        VITE_API_KEY_HEADER: ${VITE_API_KEY_HEADER:-${HF_CDSS_API_KEY_HEADER:-x-api-key}}
        VITE_CHAT_LANGUAGE: ${VITE_CHAT_LANGUAGE:-vi}
    container_name: hf_cdss_frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_API_KEY: ${VITE_API_KEY:-${HF_CDSS_API_KEYS:-change-me}}
      VITE_API_KEY_HEADER: ${VITE_API_KEY_HEADER:-${HF_CDSS_API_KEY_HEADER:-x-api-key}}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  admin-frontend:
    profiles: ["legacy-admin"]
    build:
      context: ../frontend
      dockerfile: admin/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_API_KEY: ${VITE_API_KEY:-${HF_CDSS_API_KEYS:-change-me}}
        VITE_API_KEY_HEADER: ${VITE_API_KEY_HEADER:-${HF_CDSS_API_KEY_HEADER:-x-api-key}}
        VITE_DOCTOR_DASHBOARD_URL: ${VITE_DOCTOR_DASHBOARD_URL:-http://localhost:5173}
    container_name: hf_cdss_admin_frontend
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hf_cdss_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hf_cdss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hf_cdss}
      POSTGRES_DB: ${POSTGRES_DB:-hf_cdss}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hf_cdss} -d ${POSTGRES_DB:-hf_cdss}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: hf_cdss_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/password}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password} 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: hf_cdss_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-c", "</dev/tcp/127.0.0.1/8000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  localstack:
    image: localstack/localstack:3.8.1
    container_name: hf_cdss_localstack
    ports:
      - "${LOCALSTACK_HOST_PORT:-4566}:4566"
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      PERSISTENCE: "1"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack/init:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  localstack-init:
    image: amazon/aws-cli:2.15.0
    container_name: hf_cdss_localstack_init
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until aws --endpoint-url http://localstack:4566 s3 ls 2>/dev/null; do sleep 2; done
        aws --endpoint-url http://localstack:4566 s3 mb "s3://$${HF_CDSS_RAW_BUCKET:-hf-cdss-raw}" || true
        aws --endpoint-url http://localstack:4566 s3 mb "s3://$${HF_CDSS_PROCESSED_BUCKET:-hf-cdss-processed}" || true
        echo "S3 buckets created successfully"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}

  redis:
    image: redis:7-alpine
    container_name: hf_cdss_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --- Kafka Infrastructure ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: hf_cdss_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: hf_cdss_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: hf_cdss_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "hf_cdss_cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
      KAFKA_CLUSTERS_0_ZOOKEEPER: "zookeeper:2181"
    restart: unless-stopped

  # --- Consumer/Processor Services (Long-running) ---
  scraper-base:
    profiles: ["templates"]
    build:
      context: ../backend  # Dùng chung Dockerfile của backend để có sẵn các thư viện (langchain, kafka-python)
    volumes:
      # Mount code vào để các lệnh `python -m scraper...` có thể chạy
      - ../backend:/app/backend
      - ../scraper:/app/scraper
    depends_on:
      kafka:
        condition: service_healthy

  filtering-service:
    extends: scraper-base
    command: python -m scraper.transform.extract_important_sections --kafka-bootstrap-servers ${HF_CDSS_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    restart: unless-stopped

  chunking-service:
    extends: scraper-base
    command: python -m scraper.transform.chunk_sections --kafka-bootstrap-servers ${HF_CDSS_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    restart: unless-stopped

  entity-extraction-service:
    extends: scraper-base
    command: python -m scraper.process.extract_entities_stream --kafka-bootstrap-servers ${HF_CDSS_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    restart: unless-stopped
    deploy:
      replicas: 3

  chromadb-loader:
    extends: scraper-base
    command: python -m scraper.process.load_to_chromadb --kafka-bootstrap-servers ${HF_CDSS_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092} --chroma-host chromadb --chroma-port 8000 --embedding-base-url http://ollama:11434
    depends_on:
      kafka:
        condition: service_started
      chromadb:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      entity-extraction-service:
        condition: service_started
    restart: unless-stopped

  neo4j-loader:
    extends: scraper-base
    command: python -m scraper.process.load_to_neo4j --kafka-bootstrap-servers ${HF_CDSS_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092} --neo4j-uri bolt://neo4j:7687 --neo4j-user ${NEO4J_USER:-neo4j} --neo4j-password ${NEO4J_PASSWORD:-password}
    restart: unless-stopped

  claim-creation-service:
    extends: scraper-base
    command: python -m scraper.process.create_claims --kafka-bootstrap-servers ${HF_CDSS_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    restart: unless-stopped

  rule-generation-service:
    extends: scraper-base
    command: python -m scraper.process.generate_rules --kafka-bootstrap-servers ${HF_CDSS_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    restart: unless-stopped

  rule-classification-service:
    extends: scraper-base
    command: python -m scraper.process.classify_rules --kafka-bootstrap-servers ${HF_CDSS_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    restart: unless-stopped

  relationship-derivation-service:
    extends: scraper-base
    command: python -m scraper.process.derive_relationships --kafka-bootstrap-servers ${HF_CDSS_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    restart: unless-stopped

  postgres-rule-sync-service:
    extends: scraper-base
    command: python -m scraper.process.sync_rules_to_postgres --kafka-bootstrap-servers ${HF_CDSS_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    restart: unless-stopped

